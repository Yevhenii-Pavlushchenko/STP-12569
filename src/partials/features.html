<section class="features">
  <div class="container">
    <h2 class="visually-hidden">Game Features</h2>
    <div class="features-title-image"></div>

    <picture>
      <source
        media="(min-width: 1440px)"
        srcset="
          /img/features/title-features-desktop.png    1x,
          /img/features/title-features-desktop@2x.png 2x
        "
      />
      <source
        srcset="
          /img/features/title-features-mob.png    1x,
          /img/features/title-features-mob@2x.png 2x
        "
      />
      <img src="/img/features/title-features-mob.png" alt="Features" />
    </picture>
  </div>
  <div class="swiper features-swiper">
    <div class="swiper-wrapper">
      <!-- Слайд 1 (продублируй до 11, меняя 01 на 02, 03 и т.д.) -->
      <div class="swiper-slide">
        <picture>
          <source
            media="(min-width: 1440px)"
            srcset="
              /img/features/desktop/sw-feature-desc-01.png    1x,
              /img/features/desktop/sw-feature-desc-01@2x.png 2x
            "
          />
          <source
            srcset="
              /img/features/mobile/sw-feature-mob-01.png    1x,
              /img/features/mobile/sw-feature-mob-01@2x.png 2x
            "
          />
          <img
            src="/img/features/mobile/sw-feature-mob-01.png"
            alt="Feature 1"
          />
        </picture>
      </div>
      <!-- Повтори блоки swiper-slide до 11 штук -->
    </div>

    <!-- Пагинация -->
    <div class="swiper-pagination features-pagination"></div>
  </div>
</section>
