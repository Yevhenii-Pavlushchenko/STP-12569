<section class="faq">
  <div class="container">
    <h2 class="visually-hidden">FAQ</h2>
    <picture class="box-for-img-faq">
      <source
        media="(max-width: 1439.98px)"
        type="image/png"
        srcset="/img/faq/title-faq-mob.png 1x, /img/faq/title-faq-mob@2x.png 2x"
      />
      <source
        media="(min-width: 1440px)"
        type="image/png"
        srcset="
          ../public/img/faq/title-faq-desktop.png    1x,
          ../public/img/faq/title-faq-desktop@2x.png 2x
        "
      />
      <img
        src="/img/faq/title-faq-mob.png"
        srcset="/img/faq/title-faq-mob@2x.png"
        alt="The concrete letters are caked with zombie blood."
        class="title-img-faq"
        loading="lazy"
      />
    </picture>
    <ul class="list-questions">
      <li class="question-item">
        <p class="text-question">Is the game difficult?</p>
        <button class="btn-arrow-down">
          <svg class="arrow-icon-faq">
            <use href="/sprite.svg#arrow-down"></use>
          </svg>
        </button>
      </li>
      <li class="question-item">
        <p class="text-question">Do upgrades matter?</p>
        <button class="btn-arrow-down">
          <svg class="arrow-icon-faq">
            <use href="/sprite.svg#arrow-down"></use>
          </svg>
        </button>
      </li>
      <li class="question-item">
        <p class="text-question">Is it suitable for short sessions?</p>
        <button class="btn-arrow-down">
          <svg class="arrow-icon-faq">
            <use href="/sprite.svg#arrow-down"></use>
          </svg>
        </button>
      </li>
      <li class="question-item">
        <p class="text-question">Is gameplay skill-based?</p>
        <button class="btn-arrow-down">
          <svg class="arrow-icon-faq">
            <use href="/sprite.svg#arrow-down"></use>
          </svg>
        </button>
      </li>
      <li class="question-item">
        <p class="text-question">Can I replay levels?</p>
        <button class="btn-arrow-down">
          <svg class="arrow-icon-faq">
            <use href="/sprite.svg#arrow-down"></use>
          </svg>
        </button>
      </li>
    </ul>
  </div>
</section>
